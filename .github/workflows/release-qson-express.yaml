name: Release npm package @qson/express

on:
    push:
        tags:
            - "qson-express/v*"

permissions:
    contents: write
    pull-requests: write
    id-token: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5
              with:
                    fetch-depth: 0

            - uses: pnpm/action-setup@v5

            - uses: actions/setup-node@v5
              with:
                    node-version: 24
                    registry-url: 'https://registry.npmjs.org'
                    package-manager-cache: false

            - run: pnpm install --frozen-lockfile
            - run: pnpm run lint
            - run: pnpm run test
              working-directory: packages/qson-express

            - name: Release and bump version number
              id: release
              run: pnpm run release
              working-directory: packages/qson-express

            - name: Create PR for next development version
              uses: peter-evans/create-pull-request@v7
              with:
                commit-message: "qson-express: start next development version ${{ steps.release.outputs.next_version }}"
                title: "qson-express: start next development version"
                body: |
                  Automatically created after publishing a release.

                branch: automation/qson-express-next-version
                delete-branch: true
