name: CI

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master

jobs:
    accept:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - uses: pnpm/action-setup@v5

            - uses: actions/setup-node@v5
              with:
                    node-version: 24
                    cache: pnpm

            - run: pnpm install --frozen-lockfile
            - run: pnpm run lint
            - run: pnpm run test
              working-directory: ./packages/json-qs
            - run: pnpm run build
              working-directory: ./packages/json-qs
