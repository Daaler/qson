name: CI

on:
    push:
        branches:
            - master
        tags:
            - "qson-js/v*"
    pull_request:
        branches:
            - master

jobs:
    accept:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - uses: pnpm/action-setup@v5

            - uses: actions/setup-node@v5
              with:
                    node-version: 24
                    cache: pnpm

            - run: pnpm install --frozen-lockfile
            - run: pnpm run lint
            - run: pnpm run test
              working-directory: packages/qson-js
            - run: pnpm run build
              working-directory: packages/qson-js

    release:
        if: github.ref_type == 'tag'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - uses: pnpm/action-setup@v5

            - uses: actions/setup-node@v5
              with:
                    node-version: 24
                    cache: pnpm

            - run: pnpm install --frozen-lockfile
            - run: pnpm run release
              working-directory: packages/qson-js
